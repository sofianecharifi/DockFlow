<!-- page de connexion  -->
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DockFlow - Login</title>
    <link href="./css/output.css" rel="stylesheet">
</head>

<body class="bg-[#0f172a] text-white font-sans antialiased min-h-screen flex items-center justify-center">
    <div id="login-page-root" class="w-full max-w-md px-4">

        <main role="main"
            class="bg-[#1e293b] border border-slate-700 rounded-2xl shadow-2xl p-8 sm:p-10 animate-slide-up">

            <div class="flex justify-center mb-6">
                <div
                    class="w-12 h-12 rounded-xl border border-slate-600 flex items-center justify-center bg-slate-800 hover:scale-110 hover:-rotate-3 hover:shadow-lg hover:shadow-blue-500/20 transition-all duration-300 ease-out cursor-pointer">
                    <svg width="25" height="20" viewBox="0 0 25 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M2.5 20C1.8125 20 1.22396 19.7552 0.734375 19.2656C0.244792 18.776 0 18.1875 0 17.5V2.5C0 1.8125 0.244792 1.22396 0.734375 0.734375C1.22396 0.244792 1.8125 0 2.5 0H22.5C23.1875 0 23.776 0.244792 24.2656 0.734375C24.7552 1.22396 25 1.8125 25 2.5V17.5C25 18.1875 24.7552 18.776 24.2656 19.2656C23.776 19.7552 23.1875 20 22.5 20H2.5V20M2.5 17.5H22.5V17.5V17.5V5H2.5V17.5V17.5V17.5V17.5M6.875 16.25L5.125 14.5L8.34375 11.25L5.09375 8L6.875 6.25L11.875 11.25L6.875 16.25V16.25M12.5 16.25V13.75H20V16.25H12.5V16.25"
                            fill="#D0E4FF" />
                    </svg>

                </div>
            </div>

            <header class="text-center mb-8">
                <h1 class="text-2xl font-bold text-white mb-2">Bienvenue</h1>
                <p class="text-slate-400 text-sm">Connectez vous à votre console DockFlow</p>
            </header>

            <form action="#" method="POST" class="space-y-5">

                <div>
                    <label for="email" class="block text-sm font-medium text-slate-300 mb-1.5">Adresse mail</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg width="15" height="12" viewBox="0 0 15 12" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M1.5 12C1.0875 12 0.734375 11.8531 0.440625 11.5594C0.146875 11.2656 0 10.9125 0 10.5V1.5C0 1.0875 0.146875 0.734375 0.440625 0.440625C0.734375 0.146875 1.0875 0 1.5 0H13.5C13.9125 0 14.2656 0.146875 14.5594 0.440625C14.8531 0.734375 15 1.0875 15 1.5V10.5C15 10.9125 14.8531 11.2656 14.5594 11.5594C14.2656 11.8531 13.9125 12 13.5 12H1.5V12M7.5 6.75L1.5 3V10.5V10.5V10.5H13.5V10.5V10.5V3L7.5 6.75V6.75M7.5 5.25L13.5 1.5H1.5L7.5 5.25V5.25M1.5 3V1.5V1.5V3V10.5V10.5V10.5V10.5V10.5V10.5V3V3"
                                    fill="#C2C7D0" />
                            </svg>

                        </div>
                        <input type="email" id="email" name="email" placeholder="developer@DockFlo.io" required
                            class="block w-full pl-10 pr-3 py-2 border border-slate-700 rounded-lg leading-5 bg-[#0f172a] text-slate-300 placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition duration-150 ease-in-out" />
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label for="password" class="block text-sm font-medium text-slate-300">Mot de passe</label>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg width="12" height="16" viewBox="0 0 12 16" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M1.5 15.75C1.0875 15.75 0.734375 15.6031 0.440625 15.3094C0.146875 15.0156 0 14.6625 0 14.25V6.75C0 6.3375 0.146875 5.98438 0.440625 5.69063C0.734375 5.39688 1.0875 5.25 1.5 5.25H2.25V3.75C2.25 2.7125 2.61562 1.82812 3.34687 1.09687C4.07812 0.365625 4.9625 0 6 0C7.0375 0 7.92187 0.365625 8.65312 1.09687C9.38437 1.82812 9.75 2.7125 9.75 3.75V5.25H10.5C10.9125 5.25 11.2656 5.39688 11.5594 5.69063C11.8531 5.98438 12 6.3375 12 6.75V14.25C12 14.6625 11.8531 15.0156 11.5594 15.3094C11.2656 15.6031 10.9125 15.75 10.5 15.75H1.5V15.75M1.5 14.25H10.5V14.25V14.25V6.75V6.75V6.75H1.5V6.75V6.75V14.25V14.25V14.25V14.25M6 12C6.4125 12 6.76562 11.8531 7.05937 11.5594C7.35312 11.2656 7.5 10.9125 7.5 10.5C7.5 10.0875 7.35312 9.73438 7.05937 9.44063C6.76562 9.14688 6.4125 9 6 9C5.5875 9 5.23438 9.14688 4.94063 9.44063C4.64688 9.73438 4.5 10.0875 4.5 10.5C4.5 10.9125 4.64688 11.2656 4.94063 11.5594C5.23438 11.8531 5.5875 12 6 12V12M3.75 5.25H8.25V3.75C8.25 3.125 8.03125 2.59375 7.59375 2.15625C7.15625 1.71875 6.625 1.5 6 1.5C5.375 1.5 4.84375 1.71875 4.40625 2.15625C3.96875 2.59375 3.75 3.125 3.75 3.75V5.25V5.25M1.5 14.25V14.25V14.25V6.75V6.75V6.75V6.75V6.75V6.75V14.25V14.25V14.25V14.25V14.25"
                                    fill="#C2C7D0" />
                            </svg>

                        </div>
                        <input type="password" id="password" name="password" placeholder="••••••••" required
                            class="block w-full pl-10 pr-3 py-2 border border-slate-700 rounded-lg leading-5 bg-[#0f172a] text-slate-300 placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition duration-150 ease-in-out" />
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit"
                        class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-slate-900 bg-[#dbeafe] hover:bg-white hover:-translate-y-0.5 hover:shadow-md active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 focus:ring-offset-[#0f172a] transition-all duration-200 ease-in-out">
                        Login
                    </button>
                </div>
            </form>

        </main>
    </div>
</body>

</html>
