<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DockFlow - Tableau de bord</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0f172a] text-white font-sans antialiased min-h-screen flex flex-col">

    <!-- Barre de navigation principale -->
    <header class="bg-[#1e293b] border-b border-slate-700 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div
                        class="w-8 h-8 rounded-lg border border-slate-600 flex items-center justify-center bg-slate-800 shadow-sm shadow-blue-500/20">
                        <svg width="16" height="16" viewBox="0 0 25 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M2.5 20C1.8125 20 1.22396 19.7552 0.734375 19.2656C0.244792 18.776 0 18.1875 0 17.5V2.5C0 1.8125 0.244792 1.22396 0.734375 0.734375C1.22396 0.244792 1.8125 0 2.5 0H22.5C23.1875 0 23.776 0.244792 24.2656 0.734375C24.7552 1.22396 25 1.8125 25 2.5V17.5C25 18.1875 24.7552 18.776 24.2656 19.2656C23.776 19.7552 23.1875 20 22.5 20H2.5V20M2.5 17.5H22.5V17.5V17.5V5H2.5V17.5V17.5V17.5V17.5M6.875 16.25L5.125 14.5L8.34375 11.25L5.09375 8L6.875 6.25L11.875 11.25L6.875 16.25V16.25M12.5 16.25V13.75H20V16.25H12.5V16.25"
                                fill="#D0E4FF" />
                        </svg>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-[#dbeafe]">DockFlow</span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="user-name" class="text-sm text-slate-400 hidden sm:block">Utilisateur connecté</span>
                    <button id="logout-btn"
                        class="text-sm font-medium text-slate-300 hover:text-white px-3 py-2 rounded-md hover:bg-slate-800 transition-colors">
                        Déconnexion
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Contenu principal de la page -->
    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 space-y-8 animate-slide-up">

        <!-- Section des statistiques serveur -->
        <section>
            <h2 class="text-lg font-semibold text-white mb-4">Ressources du Serveur</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-[#1e293b] border border-slate-700 rounded-xl p-5 shadow-lg flex flex-col justify-center">
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-sm font-medium text-slate-400">Processeur (CPU)</span>
                        <span id="cpu-text" class="text-lg font-bold text-white">Calcule...</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-2.5">
                        <div id="cpu-gauge" class="bg-blue-500 h-2.5 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
                    </div>
                </div>
                <div class="bg-[#1e293b] border border-slate-700 rounded-xl p-5 shadow-lg flex flex-col justify-center">
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-sm font-medium text-slate-400">Mémoire (RAM)</span>
                        <span id="ram-text" class="text-lg font-bold text-white">Calcule...</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-2.5">
                        <div id="ram-gauge" class="bg-amber-500 h-2.5 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
                    </div>
                </div>
                <div class="bg-[#1e293b] border border-slate-700 rounded-xl p-5 shadow-lg flex flex-col justify-center">
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-sm font-medium text-slate-400">Stockage</span>
                        <span id="disk-text" class="text-lg font-bold text-white">Calcule...</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-2.5">
                        <div id="disk-gauge" class="bg-emerald-500 h-2.5 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Section de gestion des conteneurs -->
        <section>
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold text-white">Vos Applications</h2>
                <button
                    class="bg-[#dbeafe] text-slate-900 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-white hover:-translate-y-0.5 hover:shadow-md transition-all duration-200">
                    + Nouvelle App
                </button>
            </div>

            <!-- Conteneur pour la liste des applications -->
            <div id="containers-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Injection dynamique des cartes de conteneurs -->
            </div>
        </section>

    </main>

    <!-- Fenêtre modale des logs -->
    <div id="logs-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <!-- Fond d'écran semi-transparent (Backdrop) -->
        <div id="logs-backdrop" class="absolute inset-0 bg-black/70 backdrop-blur-sm cursor-pointer"></div>

        <!-- Interface de type terminal pour les logs -->
        <!-- Interface de type terminal pour les logs -->
        <div class="relative w-full max-w-4xl bg-black rounded-lg shadow-2xl border border-slate-700 overflow-hidden flex flex-col h-[70vh]">
            <div class="bg-slate-800 px-4 py-3 border-b border-slate-700 flex justify-between items-center">
                <span class="text-slate-300 font-mono text-sm">Terminal - Logs</span>
                
                <div class="flex items-center gap-4">
                    <button id="close-logs-btn" class="text-slate-400 hover:text-white transition-colors" title="Fermer">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Zone d'affichage des logs -->
            <div class="p-4 flex-grow overflow-y-auto">
                <pre id="logs-stream" class="text-slate-200 font-mono text-xs sm:text-sm whitespace-pre-wrap break-all"></pre>
            </div>
        </div>
    </div>

    <!-- Inclusion des scripts de l'application -->
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="./js/pages/dashboard.page.js" type="module"></script>
</body>

</html>
