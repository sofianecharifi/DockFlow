<!-- tableau de bord principal (dashboard) après la connexion  -->
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DockFlow - Tableau de bord</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0f172a] text-white font-sans antialiased min-h-screen flex flex-col">

    <header class="bg-[#1e293b] border-b border-slate-700 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg border border-slate-600 flex items-center justify-center bg-slate-800 shadow-sm shadow-blue-500/20">
                        <svg width="16" height="16" viewBox="0 0 25 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2.5 20C1.8125 20 1.22396 19.7552 0.734375 19.2656C0.244792 18.776 0 18.1875 0 17.5V2.5C0 1.8125 0.244792 1.22396 0.734375 0.734375C1.22396 0.244792 1.8125 0 2.5 0H22.5C23.1875 0 23.776 0.244792 24.2656 0.734375C24.7552 1.22396 25 1.8125 25 2.5V17.5C25 18.1875 24.7552 18.776 24.2656 19.2656C23.776 19.7552 23.1875 20 22.5 20H2.5V20M2.5 17.5H22.5V17.5V17.5V5H2.5V17.5V17.5V17.5V17.5M6.875 16.25L5.125 14.5L8.34375 11.25L5.09375 8L6.875 6.25L11.875 11.25L6.875 16.25V16.25M12.5 16.25V13.75H20V16.25H12.5V16.25" fill="#D0E4FF" />
                        </svg>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-[#dbeafe]">DockFlow</span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-slate-400 hidden sm:block">Serveur Hôte : En ligne</span>
                    <button class="text-sm font-medium text-slate-300 hover:text-white px-3 py-2 rounded-md hover:bg-slate-800 transition-colors">
                        Déconnexion
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 space-y-8 animate-slide-up">

        <section>
            <h2 class="text-lg font-semibold text-white mb-4">Ressources du Serveur</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-[#1e293b] border border-slate-700 rounded-xl p-5 shadow-lg flex flex-col justify-center">
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-sm font-medium text-slate-400">Processeur (CPU)</span>
                        <span class="text-lg font-bold text-white">45%</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-2.5">
                        <div class="bg-blue-500 h-2.5 rounded-full" style="width: 45%"></div>
                    </div>
                </div>
                <div class="bg-[#1e293b] border border-slate-700 rounded-xl p-5 shadow-lg flex flex-col justify-center">
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-sm font-medium text-slate-400">Mémoire (RAM)</span>
                        <span class="text-lg font-bold text-white">70%</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-2.5">
                        <div class="bg-amber-500 h-2.5 rounded-full" style="width: 70%"></div>
                    </div>
                </div>
                <div class="bg-[#1e293b] border border-slate-700 rounded-xl p-5 shadow-lg flex flex-col justify-center">
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-sm font-medium text-slate-400">Stockage</span>
                        <span class="text-lg font-bold text-white">28%</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-2.5">
                        <div class="bg-emerald-500 h-2.5 rounded-full" style="width: 28%"></div>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold text-white">Mes Applications</h2>
                <button class="bg-[#dbeafe] text-slate-900 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-white hover:-translate-y-0.5 hover:shadow-md transition-all duration-200">
                    + Nouvelle App
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

                <div class="bg-[#1e293b] border border-slate-700 rounded-2xl shadow-xl overflow-hidden flex flex-col transition-all hover:border-slate-500">
                    <div class="p-5 flex-grow">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-lg font-bold text-white flex items-center gap-2">
                                    Site Vitrine (WordPress)
                                </h3>
                                <p class="text-sm text-slate-400 mt-1">v6.4.3</p>
                            </div>
                            <span class="flex h-3 w-3 relative">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                            </span>
                        </div>
                        <p class="text-sm text-emerald-400 font-medium">Actif (En ligne depuis 4 jours)</p>
                    </div>
                    
                    <div class="bg-slate-800/50 p-4 border-t border-slate-700 grid grid-cols-2 gap-2">
                        <button class="col-span-1 bg-slate-700 hover:bg-slate-600 text-white text-xs font-medium py-2 px-3 rounded-lg flex justify-center items-center gap-1 transition-colors">
                            <span>⏸️ Pause</span>
                        </button>
                        <button class="col-span-1 bg-slate-700 hover:bg-slate-600 text-white text-xs font-medium py-2 px-3 rounded-lg flex justify-center items-center gap-1 transition-colors">
                            <span>🔄 Redémarrer</span>
                        </button>
                        <button class="col-span-1 bg-blue-600/20 hover:bg-blue-600/40 text-blue-400 border border-blue-500/30 text-xs font-medium py-2 px-3 rounded-lg flex justify-center items-center gap-1 transition-colors">
                            <span>⬆️ Mettre à jour</span>
                        </button>
                        <button class="col-span-1 bg-slate-700 hover:bg-slate-600 text-white text-xs font-medium py-2 px-3 rounded-lg flex justify-center items-center gap-1 transition-colors">
                            <span>📋 Logs</span>
                        </button>
                        <button class="col-span-2 mt-1 text-red-400 hover:text-red-300 text-xs font-medium py-2 flex justify-center items-center gap-1 transition-colors">
                            🗑️ Supprimer l'application
                        </button>
                    </div>
                </div>

                <div class="bg-[#1e293b] border border-slate-700 rounded-2xl shadow-xl overflow-hidden flex flex-col transition-all hover:border-slate-500">
                    <div class="p-5 flex-grow">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-lg font-bold text-white flex items-center gap-2">
                                    Serveur Minecraft
                                </h3>
                                <p class="text-sm text-slate-400 mt-1">v1.20.4</p>
                            </div>
                            <span class="flex h-3 w-3 relative">
                                <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                            </span>
                        </div>
                        <p class="text-sm text-red-400 font-medium">Stoppé</p>
                    </div>
                    
                    <div class="bg-slate-800/50 p-4 border-t border-slate-700 grid grid-cols-2 gap-2">
                        <button class="col-span-2 bg-emerald-600/20 hover:bg-emerald-600/40 text-emerald-400 border border-emerald-500/30 text-xs font-medium py-2 px-3 rounded-lg flex justify-center items-center gap-1 transition-colors">
                            <span>▶️ Démarrer</span>
                        </button>
                        <button class="col-span-1 bg-slate-700 hover:bg-slate-600 text-slate-400 cursor-not-allowed text-xs font-medium py-2 px-3 rounded-lg flex justify-center items-center gap-1 transition-colors" disabled>
                            <span>⬆️ Mettre à jour</span>
                        </button>
                        <button class="col-span-1 bg-slate-700 hover:bg-slate-600 text-white text-xs font-medium py-2 px-3 rounded-lg flex justify-center items-center gap-1 transition-colors">
                            <span>📋 Logs</span>
                        </button>
                        <button class="col-span-2 mt-1 text-red-400 hover:text-red-300 text-xs font-medium py-2 flex justify-center items-center gap-1 transition-colors">
                            🗑️ Supprimer l'application
                        </button>
                    </div>
                </div>

            </div>
        </section>

    </main>

</body>

</html>
